<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaVibe - Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#E1306C',
                            purple: '#833AB4',
                            orange: '#F56040',
                            yellow: '#FCAF45',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- AlpineJS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-neutral-50 dark:bg-black text-neutral-900 dark:text-neutral-100 font-sans min-h-screen flex flex-col justify-between transition-colors duration-300"
      x-data="loginState()" x-init="init()">

    <!-- Top Theme Toggle Button -->
    <div class="absolute top-4 right-4 z-50">
        <button @click="toggleDarkMode()" class="p-2.5 rounded-full bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 hover:scale-105 transition shadow-sm">
            <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-5 h-5 text-yellow-500 dark:text-purple-400"></i>
        </button>
    </div>

    <!-- Main Container -->
    <div class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white dark:bg-neutral-900/50 dark:backdrop-blur-md border border-neutral-200 dark:border-neutral-800 p-8 rounded-2xl shadow-xl space-y-8 relative overflow-hidden">
            
            <!-- Instagram Gradient Mesh Background Glows -->
            <div class="absolute -top-16 -left-16 w-32 h-32 bg-gradient-to-tr from-brand-yellow to-brand-pink opacity-20 rounded-full blur-2xl pointer-events-none"></div>
            <div class="absolute -bottom-16 -right-16 w-32 h-32 bg-gradient-to-tr from-brand-purple to-brand-orange opacity-25 rounded-full blur-2xl pointer-events-none"></div>

            <!-- Header logo -->
            <div class="text-center relative z-10">
                <h1 class="text-4xl font-serif font-bold tracking-wide bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 bg-clip-text text-transparent mb-2">
                    InstaVibe
                </h1>
                <p class="text-sm text-neutral-400">Enter your credentials to access your dashboard</p>
            </div>

            <!-- Login form -->
            <form @submit.prevent="handleLogin()" class="space-y-5 relative z-10">
                <!-- Error Alert Box -->
                <div x-show="errorMessage" x-transition class="p-3 bg-red-100 dark:bg-red-950/40 border border-red-200 dark:border-red-900/50 rounded-lg text-xs text-red-600 dark:text-red-400 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                    <span x-text="errorMessage"></span>
                </div>


                <!-- Username/Email input -->
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Email or Username</label>
                    <div class="relative">
                        <input type="text" x-model="identifier" placeholder="e.g. karthik_codes or user@domain.com" required
                               class="w-full py-3 pl-10 pr-4 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                        <i data-lucide="user" class="absolute left-3.5 top-3.5 w-4 h-4 text-neutral-400"></i>
                    </div>
                </div>

                <!-- Password input -->
                <div class="space-y-1">
                    <div class="flex items-center justify-between">
                        <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs text-neutral-400 hover:text-brand-pink transition">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input :type="showPassword ? 'text' : 'password'" x-model="password" placeholder="••••••••" required
                               class="w-full py-3 pl-10 pr-12 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                        <i data-lucide="lock" class="absolute left-3.5 top-3.5 w-4 h-4 text-neutral-400"></i>
                        
                        <!-- Toggle Password visibility icon -->
                        <button type="button" @click="showPassword = !showPassword" 
                                class="absolute right-3.5 top-3 text-neutral-400 hover:text-black dark:hover:text-white transition">
                            <i :data-lucide="showPassword ? 'eye-off' : 'eye'" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-yellow-500 via-pink-500 to-purple-600 hover:opacity-95 text-white font-semibold rounded-xl text-sm transition shadow-md hover:shadow-lg flex items-center justify-center gap-2"
                        :disabled="isLoading">
                    <span x-show="!isLoading" class="flex items-center justify-center gap-1.5">
                        Log In <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </span>
                    <span x-show="isLoading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Logging in...
                    </span>
                </button>
            </form>

            <!-- Bottom redirect to Sign up -->
            <div class="text-center text-sm text-neutral-500 relative z-10 pt-4 border-t border-neutral-100 dark:border-neutral-800">
                Don't have an account? 
                <a href="register.html" class="font-bold text-brand-pink hover:underline">Sign up</a>
            </div>

        </div>
    </div>

    <!-- Minimal footer -->
    <footer class="py-6 text-center text-xs text-neutral-400 tracking-wide">
        &copy; 2026 INSTAVIBE PLATFORM. ALL RIGHTS RESERVED.
    </footer>

    <!-- Scripts -->
    <script>
        function loginState() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                role: 'user',
                identifier: '',
                password: '',
                showPassword: false,
                errorMessage: '',
                isLoading: false,

                init() {
                    if (this.darkMode) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                    this.$watch('darkMode', val => {
                        localStorage.setItem('darkMode', val);
                        if (val) {
                            document.documentElement.classList.add('dark');
                        } else {
                            document.documentElement.classList.remove('dark');
                        }
                    });
                    this.$nextTick(() => {
                        lucide.createIcons();
                    });
                    this.$watch('showPassword', () => this.$nextTick(() => lucide.createIcons()));
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                },

                handleLogin() {
                    this.errorMessage = '';
                    
                    // Client-side quick check
                    if (!this.identifier.trim() || !this.password.trim()) {
                        this.errorMessage = 'Please fill out all fields.';
                        return;
                    }

                    if (this.password.length < 6) {
                        this.errorMessage = 'Password must be at least 6 characters.';
                        return;
                    }

                    // Start spinner
                    this.isLoading = true;

                    // API login request
                    fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            identifier: this.identifier,
                            password: this.password
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        this.isLoading = false;
                        if (data.error) {
                            this.errorMessage = data.error;
                        } else {
                            if (data.user.role !== 'user') {
                                this.errorMessage = 'Access Denied. Standard user accounts only.';
                                return;
                            }
                            
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('currentUser', JSON.stringify(data.user));
                            window.location.href = 'dashboard.html';
                        }
                    })
                    .catch(err => {
                        this.isLoading = false;
                        this.errorMessage = 'A network error occurred. Please try again.';
                        console.error('Login error:', err);
                    });
                }
            }
        }
    </script>
</body>
</html>
