<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaVibe - Register</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#E1306C',
                            purple: '#833AB4',
                            orange: '#F56040',
                            yellow: '#FCAF45',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- AlpineJS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-neutral-50 dark:bg-black text-neutral-900 dark:text-neutral-100 font-sans min-h-screen flex flex-col justify-between transition-colors duration-300"
      x-data="registerState()" x-init="init()">

    <!-- Top Theme Toggle Button -->
    <div class="absolute top-4 right-4 z-50">
        <button @click="toggleDarkMode()" class="p-2.5 rounded-full bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 hover:scale-105 transition shadow-sm">
            <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-5 h-5 text-yellow-500 dark:text-purple-400"></i>
        </button>
    </div>

    <!-- Main Container -->
    <div class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-lg bg-white dark:bg-neutral-900/50 dark:backdrop-blur-md border border-neutral-200 dark:border-neutral-800 p-8 rounded-2xl shadow-xl space-y-6 relative overflow-hidden my-8">
            
            <!-- Instagram Gradient Mesh Background Glows -->
            <div class="absolute -top-16 -left-16 w-32 h-32 bg-gradient-to-tr from-brand-yellow to-brand-pink opacity-20 rounded-full blur-2xl pointer-events-none"></div>
            <div class="absolute -bottom-16 -right-16 w-32 h-32 bg-gradient-to-tr from-brand-purple to-brand-orange opacity-25 rounded-full blur-2xl pointer-events-none"></div>

            <!-- Header -->
            <div class="text-center relative z-10">
                <h1 class="text-4xl font-serif font-bold tracking-wide bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 bg-clip-text text-transparent mb-2">
                    InstaVibe
                </h1>
                <p class="text-sm text-neutral-400">Create a new account to get started</p>
            </div>

            <!-- Register Form -->
            <form @submit.prevent="handleRegister()" class="space-y-4 relative z-10">
                <!-- Alerts / Status Boxes -->
                <div x-show="errorMessage" x-transition class="p-3 bg-red-100 dark:bg-red-950/40 border border-red-200 dark:border-red-900/50 rounded-lg text-xs text-red-600 dark:text-red-400 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4.5 h-4.5 flex-shrink-0"></i>
                    <span x-text="errorMessage"></span>
                </div>
                <div x-show="successMessage" x-transition class="p-3 bg-green-100 dark:bg-green-950/40 border border-green-200 dark:border-green-900/50 rounded-lg text-xs text-green-600 dark:text-green-400 flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-4.5 h-4.5 flex-shrink-0"></i>
                    <span x-text="successMessage"></span>
                </div>


                <!-- Grid of Name and Email -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Full Name -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Full Name</label>
                        <div class="relative">
                            <input type="text" x-model="name" placeholder="John Doe" required
                                   class="w-full py-2.5 pl-10 pr-4 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                            <i data-lucide="user" class="absolute left-3.5 top-3 w-4 h-4 text-neutral-400"></i>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Email Address</label>
                        <div class="relative">
                            <input type="email" x-model="email" placeholder="john@example.com" required
                                   class="w-full py-2.5 pl-10 pr-4 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                            <i data-lucide="mail" class="absolute left-3.5 top-3 w-4 h-4 text-neutral-400"></i>
                        </div>
                    </div>
                </div>

                <!-- Phone Number -->
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Phone Number</label>
                    <div class="relative">
                        <input type="tel" x-model="phoneNumber" placeholder="+1 (555) 123-4567" required
                               class="w-full py-2.5 pl-10 pr-4 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                        <i data-lucide="phone" class="absolute left-3.5 top-3 w-4 h-4 text-neutral-400"></i>
                    </div>
                </div>

                <!-- Passwords Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Password -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Password</label>
                        <div class="relative">
                            <input :type="showPassword ? 'text' : 'password'" x-model="password" placeholder="••••••••" required
                                   class="w-full py-2.5 pl-10 pr-4 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                            <i data-lucide="lock" class="absolute left-3.5 top-3 w-4 h-4 text-neutral-400"></i>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Confirm Password</label>
                        <div class="relative">
                            <input :type="showPassword ? 'text' : 'password'" x-model="confirmPassword" placeholder="••••••••" required
                                   class="w-full py-2.5 pl-10 pr-4 rounded-xl border border-neutral-300 dark:border-neutral-700 bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink focus:border-transparent dark:text-white transition">
                            <i data-lucide="lock-keyhole" class="absolute left-3.5 top-3 w-4 h-4 text-neutral-400"></i>
                        </div>
                    </div>
                </div>

                <!-- View Password Checkbox -->
                <div class="flex items-center gap-2 pt-1">
                    <input type="checkbox" id="view-pwd" x-model="showPassword"
                           class="w-4 h-4 rounded border-neutral-300 text-brand-pink focus:ring-brand-pink bg-transparent cursor-pointer">
                    <label for="view-pwd" class="text-xs font-semibold text-neutral-500 dark:text-neutral-400 cursor-pointer select-none">
                        View password
                    </label>
                </div>

                <!-- Register Submit Button -->
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-yellow-500 via-pink-500 to-purple-600 hover:opacity-95 text-white font-semibold rounded-xl text-sm transition shadow-md hover:shadow-lg flex items-center justify-center gap-2 mt-4"
                        :disabled="isLoading">
                    <span x-show="!isLoading" class="flex items-center justify-center gap-1.5">
                        Register Account <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </span>
                    <span x-show="isLoading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Creating account...
                    </span>
                </button>
            </form>

            <!-- Redirect to login -->
            <div class="text-center text-sm text-neutral-500 relative z-10 pt-4 border-t border-neutral-100 dark:border-neutral-800">
                Already have an account? 
                <a href="index.html" class="font-bold text-brand-pink hover:underline">Log in</a>
            </div>

        </div>
    </div>

    <!-- Minimal footer -->
    <footer class="py-6 text-center text-xs text-neutral-400 tracking-wide">
        &copy; 2026 INSTAVIBE PLATFORM. ALL RIGHTS RESERVED.
    </footer>

    <!-- Scripts -->
    <script>
        function registerState() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                role: 'user',
                name: '',
                email: '',
                phoneNumber: '',
                password: '',
                confirmPassword: '',
                showPassword: false,
                errorMessage: '',
                successMessage: '',
                isLoading: false,

                init() {
                    if (this.darkMode) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                    this.$watch('darkMode', val => {
                        localStorage.setItem('darkMode', val);
                        if (val) {
                            document.documentElement.classList.add('dark');
                        } else {
                            document.documentElement.classList.remove('dark');
                        }
                    });
                    this.$nextTick(() => {
                        lucide.createIcons();
                    });
                    this.$watch('showPassword', () => this.$nextTick(() => lucide.createIcons()));
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                },

                handleRegister() {
                    this.errorMessage = '';
                    this.successMessage = '';
                    
                    // Fields Validation
                    if (!this.name.trim() || !this.email.trim() || !this.phoneNumber.trim() || !this.password.trim() || !this.confirmPassword.trim()) {
                        this.errorMessage = 'All registration fields are required.';
                        return;
                    }

                    if (this.password.length < 6) {
                        this.errorMessage = 'Password must be at least 6 characters.';
                        return;
                    }

                    if (this.password !== this.confirmPassword) {
                        this.errorMessage = 'Passwords do not match.';
                        return;
                    }

                    // Start spinner
                    this.isLoading = true;

                    // API registration request
                    fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: this.name,
                            email: this.email,
                            phoneNumber: this.phoneNumber,
                            password: this.password
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        this.isLoading = false;
                        if (data.error) {
                            this.errorMessage = data.error;
                        } else {
                            this.successMessage = 'Registration successful! Redirecting to login...';
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 1000);
                        }
                    })
                    .catch(err => {
                        this.isLoading = false;
                        this.errorMessage = 'A network error occurred. Please try again.';
                        console.error('Registration error:', err);
                    });
                }
            }
        }
    </script>
</body>
</html>
